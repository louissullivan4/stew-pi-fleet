services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ./data/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host

  pi-fleet:
    build: .
    image: pi-fleet:latest
    container_name: pi-fleet
    restart: unless-stopped
    user: "root"
    ports:
      - "3001:3001"

    volumes:
      - ./config:/data/config:ro
      - ./data/db:/data/db
      - ./data/ssh:/data/ssh:ro

    environment:
      NODE_ENV: production
      PORT: 3001

      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:?Set DASHBOARD_PASSWORD in .env}

      CONFIG_PATH: /data/config/pis.yaml
      DB_PATH: /data/db/fleet.db
      SSH_KEY_PATH: /data/ssh/pi_fleet_rsa

      WEBHOOK_URL:    ${WEBHOOK_URL:-}
      SMTP_HOST:      ${SMTP_HOST:-}
      SMTP_PORT:      ${SMTP_PORT:-587}
      SMTP_USER:      ${SMTP_USER:-}
      SMTP_PASS:      ${SMTP_PASS:-}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_EMAIL_TO:   ${ALERT_EMAIL_TO:-}

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/auth/verify', r => process.exit(r.statusCode === 401 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
