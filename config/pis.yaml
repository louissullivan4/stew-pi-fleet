# Pi Fleet — managed host configuration
# Each Pi needs SSH key-based access; run `npm run setup` to generate keys.
pis:
  - id: stew-network
    name: "Network Pi"
    ip: "192.168.1.32"
    ssh_user: stew-network
    role: network
    services:
      - pihole
      - unbound
      - wireguard
      - fail2ban
    reboot_schedule: "0 4 * * 0"
    health_check_interval: 5


  - id: stew-home
    name: "Home Automation"
    ip: "192.168.1.34"
    ssh_user: stew
    role: home-automation
    services:
      - home-assistant
      - stew-pi-fleet
    reboot_schedule: "15 4 * * 0"
    health_check_interval: 5


  - id: stew-media
    name: "Media Server"
    ip: "192.168.1.36"
    ssh_user: stew
    role: media
    services:
      - jellyfin
    reboot_schedule: "20 4 * * 0"
    health_check_interval: 5


  - id: stew-storage
    name: "Storage / NAS"
    ip: "192.168.1.38"
    ssh_user: stew
    role: storage
    services:
      - nextcloud
      - immich
      - samba
    reboot_schedule: "25 4 * * 0"
    health_check_interval: 5


  - id: stew-brain
    name: "AI Brain"
    ip: "192.168.1.40"
    ssh_user: stew
    role: ai
    services:
      - ollama
      - open-webui
    reboot_schedule: "30 4 * * 0"
    health_check_interval: 5
